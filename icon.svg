<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8a5cff"/>
      <stop offset="1" stop-color="#ff6fa5"/>
    </linearGradient>
    <radialGradient id="center" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="1" stop-color="#ffc24d"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <g transform="translate(256,252)">
    <!-- petals -->
    <g fill="#fff7fb">
      <ellipse cx="0" cy="-96" rx="48" ry="70"/>
      <ellipse cx="0" cy="-96" rx="48" ry="70" transform="rotate(72)"/>
      <ellipse cx="0" cy="-96" rx="48" ry="70" transform="rotate(144)"/>
      <ellipse cx="0" cy="-96" rx="48" ry="70" transform="rotate(216)"/>
      <ellipse cx="0" cy="-96" rx="48" ry="70" transform="rotate(288)"/>
    </g>
    <!-- face center -->
    <circle r="66" fill="url(#center)"/>
    <!-- blush -->
    <g fill="#ff8fb8" opacity="0.85">
      <ellipse cx="-40" cy="16" rx="11" ry="8"/>
      <ellipse cx="40" cy="16" rx="11" ry="8"/>
    </g>
    <!-- eyes -->
    <g fill="#5a3a6e">
      <circle cx="-24" cy="-6" r="9"/>
      <circle cx="24" cy="-6" r="9"/>
    </g>
    <circle cx="-21" cy="-9" r="3" fill="#fff"/>
    <circle cx="27" cy="-9" r="3" fill="#fff"/>
    <!-- smile -->
    <path d="M-18 18 Q0 36 18 18" stroke="#5a3a6e" stroke-width="7" fill="none" stroke-linecap="round"/>
  </g>
</svg>
